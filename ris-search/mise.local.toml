[tools]
java = "21"
lefthook = "latest"
trivy = "latest"

[env]
DOCKER_HOST="unix:///Users/andreas/.config/colima/default/docker.sock"
NUXT_PUBLIC_RIS_BACKEND_URL = "http://localhost:8090"
PLAYWRIGHT_HTML_OPEN = "never"

[tasks.frontend]
usage = """
  flag "-p --private" negate="--no-private" default="true"
"""
dir = "frontend"
run = "NUXT_PUBLIC_PRIVATE_FEATURES_ENABLED=${usage_private} pnpm dev"

[tasks."frontend:test"]
dir = "frontend"
run = "pnpm test:watch"

[tasks."frontend:fix"]
dir = "frontend"
run = """
  pnpm style:fix
  pnpm typecheck
"""

[tasks."frontend:api-types"]
depends = ["backend:api-types"]
dir = "frontend"
run = "pnpm generate-api-types"

[tasks.e2e]
usage = """
  flag "-p --private" negate="--no-private" default="true"
"""
dir = "frontend"
run = "NUXT_PUBLIC_PRIVATE_FEATURES_ENABLED=${usage_private} pnpm exec playwright test --ui"

[tasks.backend]
usage = """
  flag "-s --staging" default="false"
"""
dir = "backend"
run = """
  if [[ ${usage_staging?} == "true" ]]; then
    kubectl port-forward deployment/ris-portal-backend-local -n ris-staging 8090:8080
  else
    ./gradlew clean bootRun --args='--spring.profiles.active=default,e2e'
  fi
"""

[tasks."backend:test"]
dir = "backend"
run = "./gradlew test"

[tasks."backend:test:integration"]
dir = "backend"
run = "./gradlew integrationTest --exclude-task test"

[tasks."backend:api-types"]
dir = "backend"
run = "./gradlew integrationTest --tests 'de.bund.digitalservice.ris.search.integration.SwaggerIntegrationTest'"

[tasks.services]
run = "docker compose up -d"

[tasks."services:stop"]
run = "docker compose down"

[tasks.http]
usage = """
  arg "<url>"
  arg "[params]" var=#true
"""
run = "http -a \"basic-auth-staging:$(op read 'op://Team NeuRIS/Basic auth public portal staging/password')\" https://ris-portal.dev.ds4g.net/${usage_url} ${usage_params}"

[tasks.ticket]
usage = """
  flag "-w --web" default="false"
"""
run = """
  branch=$(git branch --show-current)
  ticket=$(echo "$branch" | grep -ioE '^risdev-[0-9]+' | tr '[:lower:]' '[:upper:]')
  if [[ -z "$ticket" ]]; then
    echo "No ticket ID found in branch name: $branch"
    exit 1
  fi
  web_flag=""
  if [[ ${usage_web?} == "true" ]]; then
    web_flag="--web"
  fi
  acli jira workitem view "$ticket" $web_flag
"""

[tasks.opencode]
run = "opencode"
